name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles dmg
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
          - platform: windows-latest
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install dependencies
        run: npm ci

      - name: Sync app version from tag
        run: npm run version:sync -- "${GITHUB_REF_NAME#v}"
        shell: bash

      - name: Download Pdfium resources
        run: npm run pdfium:setup

      - name: Build Tauri bundles and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LiteUtools ${{ github.ref_name }}
          releaseBody: |
            Automated release for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
